# Meridian Support: backend tests, frontend lint/export, Docker image for Cloud Run, deploy when GCP_PROJECT_ID is set.
# Configure Actions variables + secrets per README (Cloud Run). Optional MCP_* variables pass through to Cloud Run for order/catalog tools.
name: Meridian Support — CI / Deploy

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: meridian-support-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-tests:
    name: Backend tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      DATABASE_URL: sqlite+aiosqlite:///./data/ci.db
      SECRET_KEY: ci-secret-key-at-least-32-characters-long
      OPENROUTER_API_KEY: ""
      GOOGLE_CLIENT_ID: ""
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install backend dependencies
        run: |
          mkdir -p data
          uv sync --group dev

      - name: Run pytest
        run: uv run pytest -q

  frontend-check:
    name: Frontend lint + static export
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - run: npm ci
      - run: npm run lint
      - run: npm run build

  container-build:
    name: Container build
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-check]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Cloud Run image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: meridian-support-agent:test
          build-args: |
            NEXT_PUBLIC_API_URL=
            NEXT_PUBLIC_GOOGLE_CLIENT_ID=${{ vars.NEXT_PUBLIC_GOOGLE_CLIENT_ID }}

  deploy:
    name: Deploy to Cloud Run
    runs-on: ubuntu-latest
    needs: container-build
    if: github.event_name != 'pull_request' && vars.GCP_PROJECT_ID != ''
    env:
      GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
      GCP_REGION: ${{ vars.GCP_REGION }}
      GAR_REPOSITORY: ${{ vars.GAR_REPOSITORY }}
      CLOUD_RUN_SERVICE: ${{ vars.CLOUD_RUN_SERVICE }}
      IMAGE: ${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ vars.GAR_REPOSITORY }}/${{ vars.CLOUD_RUN_SERVICE }}:${{ github.sha }}
      LATEST_IMAGE: ${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ vars.GAR_REPOSITORY }}/${{ vars.CLOUD_RUN_SERVICE }}:latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker "${GCP_REGION}-docker.pkg.dev" --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE }}
            ${{ env.LATEST_IMAGE }}
          build-args: |
            NEXT_PUBLIC_API_URL=
            NEXT_PUBLIC_GOOGLE_CLIENT_ID=${{ vars.NEXT_PUBLIC_GOOGLE_CLIENT_ID }}

      - name: Generate Cloud Run env file
        env:
          APP_NAME: ${{ vars.APP_NAME }}
          HOST: ${{ vars.HOST }}
          CORS_ORIGINS: ${{ vars.CORS_ORIGINS }}
          ALLOWED_HOSTS: ${{ vars.ALLOWED_HOSTS }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          GOOGLE_CLIENT_ID: ${{ vars.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_BASE_URL: ${{ vars.OPENROUTER_BASE_URL }}
          OPENROUTER_DEFAULT_MODEL: ${{ vars.OPENROUTER_DEFAULT_MODEL }}
          MAX_REACT_ITERATIONS: ${{ vars.MAX_REACT_ITERATIONS }}
          MCP_SERVER_URL: ${{ vars.MCP_SERVER_URL }}
          MCP_SERVER_ID: ${{ vars.MCP_SERVER_ID }}
          MCP_HTTP_TIMEOUT_SECONDS: ${{ vars.MCP_HTTP_TIMEOUT_SECONDS }}
        run: |
          python - <<'PY'
          import json
          import os

          defaults = {
              "APP_ENV": "production",
              "DEBUG": "false",
              "SECURE_COOKIES": "true",
          }
          keys = [
              "APP_NAME",
              "HOST",
              "CORS_ORIGINS",
              "ALLOWED_HOSTS",
              "DATABASE_URL",
              "SECRET_KEY",
              "GOOGLE_CLIENT_ID",
              "GOOGLE_CLIENT_SECRET",
              "OPENROUTER_API_KEY",
              "OPENROUTER_BASE_URL",
              "OPENROUTER_DEFAULT_MODEL",
              "MAX_REACT_ITERATIONS",
              "MCP_SERVER_URL",
              "MCP_SERVER_ID",
              "MCP_HTTP_TIMEOUT_SECONDS",
          ]

          values = dict(defaults)
          for key in keys:
              value = os.environ.get(key)
              if value:
                  values[key] = value

          with open("/tmp/cloudrun-env.yaml", "w", encoding="utf-8") as env_file:
              for key, value in values.items():
                  env_file.write(f"{key}: {json.dumps(value)}\n")
          PY

      - name: Deploy Cloud Run service
        run: |
          gcloud run deploy "${CLOUD_RUN_SERVICE}" \
            --project "${GCP_PROJECT_ID}" \
            --region "${GCP_REGION}" \
            --image "${IMAGE}" \
            --platform managed \
            --allow-unauthenticated \
            --env-vars-file /tmp/cloudrun-env.yaml \
            --port 8080 \
            --timeout 3600 \
            --quiet
